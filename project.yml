name: GreenShot
options:
  bundleIdPrefix: com.greenshot
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1" # iPhone only

targets:
  GreenShot:
    type: application
    platform: iOS
    sources:
      - path: GreenShot
        excludes:
          - "Resources/Sounds/**"
    resources:
      - path: GreenShot/Resources/yolov8n.mlpackage
      - path: GreenShot/Resources/Sounds
        buildPhase: resources
    info:
      path: GreenShot/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.greenshot.app
        INFOPLIST_FILE: GreenShot/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
